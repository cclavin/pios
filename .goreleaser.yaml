version: 2
project_name: pios

before:
  hooks:
    - go mod tidy

builds:
  - id: pios
    main: ./cmd/pios
    binary: pios
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - repository:
      owner: cclavin
      name: homebrew-tap
    directory: Formula
    description: "AI Project Execution Contract CLI"
    homepage: "https://github.com/cclavin/PIOS"
    license: "MIT"
    test: |
      system "#{bin}/pios --help"

winget:
  - name: pios
    publisher: cclavin
    license: MIT
    short_description: "AI Project Execution Contract CLI"
    homepage: "https://github.com/cclavin/PIOS"
    repository:
      owner: cclavin
      name: winget-pkgs
      branch: pios-{{.Version}}
      pull_request:
        draft: false
