<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIOS Destruction Simulator</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f0f13;
            /* Dark theme */
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(0, 255, 100, 0.8);
        }

        h2 {
            margin: 0 0 5px 0;
            font-weight: 600;
            font-size: 24px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            margin: 0;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="ui">
        <h2>PIOS Execution Contract: Verified</h2>
        <p>Click anywhere to spawn a neon cannonball.</p>
    </div>
    <!-- Load Matter.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        // Module aliases
        var Engine = Matter.Engine,
            Render = Matter.Render,
            Runner = Matter.Runner,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Composites = Matter.Composites;

        // Create engine
        var engine = Engine.create(),
            world = engine.world;

        // Create renderer
        var render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent' // let CSS handle the dark background
            }
        });

        Render.run(render);

        // Create runner
        var runner = Runner.create();
        Runner.run(runner, engine);

        // Add boundaries
        var wallOptions = {
            isStatic: true,
            render: { fillStyle: '#1a1a24' }
        };
        var ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 25, window.innerWidth + 100, 50, wallOptions);
        var leftWall = Bodies.rectangle(-25, window.innerHeight / 2, 50, window.innerHeight * 2, wallOptions);
        var rightWall = Bodies.rectangle(window.innerWidth + 25, window.innerHeight / 2, 50, window.innerHeight * 2, wallOptions);

        Composite.add(world, [ground, leftWall, rightWall]);

        // Build the glass block tower
        var stackCols = 8;
        var stackRows = 16;
        var blockWidth = 40;
        var blockHeight = 40;
        var startX = window.innerWidth / 2 - (stackCols * blockWidth) / 2;
        var startY = window.innerHeight - (stackRows * blockHeight) - 50;

        var tower = Composites.stack(startX, startY, stackCols, stackRows, 0, 0, function (x, y) {
            return Bodies.rectangle(x, y, blockWidth, blockHeight, {
                render: {
                    fillStyle: 'rgba(0, 255, 200, 0.1)',
                    strokeStyle: '#00ffcc',
                    lineWidth: 2
                },
                friction: 0.5,
                density: 0.001
            });
        });

        Composite.add(world, tower);

        // Add mouse interaction for spawning cannonballs
        window.addEventListener('mousedown', function (event) {
            var ball = Bodies.circle(event.clientX, event.clientY, 30, {
                density: 0.1, // High density for massive impact force
                restitution: 0.8, // Bouncy
                friction: 0.1,
                render: {
                    fillStyle: '#ff0055',
                    strokeStyle: '#ffaa00',
                    lineWidth: 3
                }
            });
            Composite.add(world, ball);
        });

        // Simple resize logic
        window.addEventListener('resize', function () {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 25 });
        });
    </script>
</body>

</html>
